[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/latest-bias"
  to = "/.netlify/functions/latest-bias"
  status = 200

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate-bias"
  status = 200

[[redirects]]
  from = "/"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard/index.html"
  status = 200
